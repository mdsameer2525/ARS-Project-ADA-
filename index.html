<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Algorithm Recommendation System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
            padding: 30px;
        }

        .container {
            background: white;
            color: black;
            padding: 25px;
            border-radius: 12px;
            width: 400px;
            margin: auto;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            margin-bottom: 20px;
        }

        input, select {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            background: #667eea;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            width: 95%;
            font-size: 16px;
        }

        button:hover {
            background: #5a67d8;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background: #f3f3f3;
        }

        .learn {
            margin-top: 20px;
            text-align: left;
        }

        .learn h3 {
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1> Algorithm Recommendation System</h1>

    <div class="container">

        <input type="number" id="size" placeholder="Enter Problem Size">

        <select id="overlap">
            <option value="">Overlapping Problems?</option>
            <option value="1">Yes</option>
            <option value="2">No</option>
        </select>

        <select id="greedy">
            <option value="">Greedy Choice Property?</option>
            <option value="1">Yes</option>
            <option value="2">No</option>
        </select>

        <select id="divide">
            <option value="">Divisible Problem?</option>
            <option value="1">Yes</option>
            <option value="2">No</option>
        </select>

        <button onclick="suggestAlgorithm()">Suggest Algorithm</button>
        <button onclick="learnAlgorithms()">Learn Algorithms</button>

        <div class="result" id="result"></div>
        <div class="learn" id="learn"></div>

    </div>

<script>
function suggestAlgorithm() {
    let x = document.getElementById("size").value;
    let y = document.getElementById("overlap").value;
    let z = document.getElementById("greedy").value;
    let a = document.getElementById("divide").value;

    let result = "";

    if (x <= 0 || x === "") {
        document.getElementById("result").innerHTML = "❌ Invalid Input!";
        return;
    }

    // Problem Size
    if (x < 50)
        result += "<b>Problem Size:</b> Small<br>";
    else if (x < 100)
        result += "<b>Problem Size:</b> Medium<br>";
    else
        result += "<b>Problem Size:</b> Large<br>";

    // Logic
    if (y == 1 && x >= 100) {
        result += "<br><b>Algorithm:</b> Dynamic Programming<br>";
        result += "<b>Reason:</b> Overlapping subproblems + large input.<br>";
        result += "<b>Example:</b> Fibonacci, Knapsack<br>";
        result += "<b>Time Complexity:</b> O(n) to O(n²)";
    }
    else if (y == 1) {
        result += "<br><b>Algorithm:</b> Brute Force<br>";
        result += "<b>Reason:</b> Overlapping exists but small input.<br>";
        result += "<b>Example:</b> Linear Search<br>";
        result += "<b>Time Complexity:</b> O(n²)";
    }
    else if (z == 1) {
        result += "<br><b>Algorithm:</b> Greedy<br>";
        result += "<b>Reason:</b> Greedy choice property satisfied.<br>";
        result += "<b>Example:</b> Kruskal, Prim<br>";
        result += "<b>Time Complexity:</b> O(n log n)";
    }
    else if (a == 1) {
        result += "<br><b>Algorithm:</b> Divide & Conquer<br>";
        result += "<b>Reason:</b> Can divide into subproblems.<br>";
        result += "<b>Example:</b> Merge Sort, Quick Sort<br>";
        result += "<b>Time Complexity:</b> O(n log n)";
    }
    else {
        result += "<br><b>Algorithm:</b> Brute Force<br>";
        result += "<b>Reason:</b> No optimization property.<br>";
        result += "<b>Example:</b> Naive Approach<br>";
        result += "<b>Time Complexity:</b> O(n²)";
    }

    document.getElementById("result").innerHTML = result;
}

function learnAlgorithms() {
    let content = `
    <h3>1.Brute Force</h3>
    Tries all possible solutions<br>
    Example: Linear Search<br>
    Time: O(n²)<br>

    <h3>2.Greedy</h3>
    Chooses best option at each step<br>
    Example: Kruskal, Prim<br>
    Time: O(n log n)<br>

    <h3>3.Dynamic Programming</h3>
    Solves overlapping subproblems<br>
    Example: Fibonacci, Knapsack<br>
    Time: O(n) / O(n²)<br>

    <h3>4.Divide & Conquer</h3>
    Breaks into smaller parts<br>
    Example: Merge Sort, Quick Sort<br>
    Time: O(n log n)
    `;

    document.getElementById("learn").innerHTML = content;
}
</script>

</body>
</html>
